  <meta property="og:type" content="website">

<body>
  <div class="marco-superior">
    <img src="/assets/img/decoracion/floral-superior.webp" alt="" class="floral">

  <p id="error" class="error" hidden></p>

  <section id="contenido" class="invitacion">

    <p class="saludo" id="saludo"></p>
    <p class="frase">Con la bendición de nuestras familias, tenemos el honor de invitarte a celebrar nuestra boda.</p>

    <h1 class="hero-nombres">
      ARIANA ROJAS
      <span class="hero-amp">&amp;</span>
      JUAN PATIÑO
    </h1>

    <hr class="separador-oro">

    <p class="hero-fecha" id="fecha"></p>
    <p class="hero-lugar"><span id="hora"></span></p>
    <p class="hero-lugar"><span id="lugar"></span></p>
    <p class="subquote" id="cocktail-msg"></p>

    <p class="hashtag" id="hashtag"></p>

    <div class="botones">
      <a id="rsvp-link" class="btn" href="#">Confirmar asistencia</a>
      <a id="sitio-link" class="btn btn-secundario" href="#">Ver sitio de la boda</a>
    </div>
  </section>

  <footer class="site-footer">
    <p class="marca">ARI &amp; JUAN 2026</p>
    <p>Cuenca, Ecuador · 25.07.2026</p>
  </footer>

  <div class="marco-inferior">
    <img src="/assets/img/decoracion/floral-inferior.webp" alt="" class="floral">
